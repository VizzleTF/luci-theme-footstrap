<!DOCTYPE html>
<!--
  Design reference (source of truth) for luci-theme-footstrap.
  Imported from Claude Design project a8c4bddc-b860-4d57-8229-50f157ea06bb
  file "OpenWrt Status Redesign.dc.html".
  Contains two layout directions: 1A Sidebar Console, 1B Bento Grid (top nav).
  This is the ORIGINAL canvas mock (React/DCLogic theme-toggle). Kept verbatim
  as the visual target. Implementation lives in ../../luci-theme-footstrap/.
-->
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  a{color:var(--accent);text-decoration:none}
  a:hover{opacity:.82}
  ::selection{background:var(--accent-soft)}
  @keyframes livepulse{0%{box-shadow:0 0 0 0 var(--accent-soft)}70%{box-shadow:0 0 0 7px transparent}100%{box-shadow:0 0 0 0 transparent}}
</style>
</head>
<body>
<div id="wrap" style="--bg:#0a0d13;--panel:#111620;--panel2:#161c28;--border:#232b3a;--text:#e8edf5;--dim:#8b95a7;--accent:#3ba7ff;--accent-soft:rgba(59,167,255,.14);--track:#1b2230;--good:#43e0a0;--warn:#ffb454;--danger:#ff6b6b;--knob-x:3px;--knob-bg:#3ba7ff;--shadow:0 1px 2px rgba(0,0,0,.4);background:var(--bg);color:var(--text);min-height:100%;padding:44px;font-family:'Manrope',system-ui,sans-serif">
  <p style="color:#8b95a7;font-family:monospace">Полный исходник макета (обе панели 1A/1B + JS-переключатель темы) сохранён в истории Claude Design проекта a8c4bddc-b860-4d57-8229-50f157ea06bb. Здесь — только токены и заметки; см. docs/08-design-system.md для извлечённой спецификации.</p>
</div>
</body>
</html>

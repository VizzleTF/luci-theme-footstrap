name: Build LuCI theme packages

# luci-theme-footstrap is noarch (LUCI_PKGARCH:=all), so one build per package
# format covers every target. Two formats are produced:
#   apk  — OpenWrt 25.12+ (built with the snapshot SDK)
#   ipk  — OpenWrt 24.10  (built with the latest 24.10.x SDK)
on:
  push:
    tags: ['v*']
    branches: [main]
  pull_request:
  workflow_dispatch:

# Read-only by default. Only the release job creates a release, and it declares the write
# scope itself. The token was workflow-wide before, which handed it to every `pull_request`
# run — including the `npm ci` in the lint job, i.e. to the lifecycle scripts of every dev
# dependency. Nothing needs the write scope until there is a tag to publish.
permissions:
  contents: read

jobs:
  # Gates that need nothing but python3, awk and sh — so they cost seconds and can
  # never break the OpenWrt buildbot, which does not have node and never will.
  # The npm-based gates live in the `lint` job below; both are CI-only, never in the
  # Makefile. See docs/18.
  check:
    name: Static checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Shell syntax
        run: |
          set -eu
          # tools/ is in the glob because release-notes.sh is only ever RUN by the release
          # job — i.e. after both packages have already built. A syntax error in it used to
          # be discovered at the one moment it costs the most.
          for f in luci-theme-footstrap/*.sh install.sh tools/*.sh \
                   luci-theme-footstrap/root/usr/libexec/*.sh \
                   luci-theme-footstrap/root/etc/uci-defaults/*; do
            [ -f "$f" ] || continue
            sh -n "$f" || { echo "syntax error: $f"; exit 1; }
          done

      # THE TEMPLATES HAD NO PARSER. luci.mk copies ucode/ to the router verbatim and never
      # compiles it, so a stray brace in header.ut built green, released, and then every
      # user's LuCI silently fell back to a different theme (the "Theme fallback" indicator,
      # docs/01) — the one way this repo could ship a completely broken UI with CI all green.
      #
      # `ucode -T -c` is LuCI's own trycompile, so this is the same check the router would do,
      # run before the release instead of after it. ucode is not packaged for Ubuntu; it is
      # built from the commit pinned in luci-upstream.pin, exactly as jsmin.c is, and for the
      # same reason — a gate fetched from a moving master is whatever upstream pushed last.
      - name: Compile-check the ucode templates
        run: |
          set -eu
          . luci-theme-footstrap/luci-upstream.pin
          sudo apt-get update && sudo apt-get install -y cmake libjson-c-dev
          git clone -q https://github.com/jow-/ucode "$RUNNER_TEMP/ucode"
          git -C "$RUNNER_TEMP/ucode" checkout -q "$UCODE_PIN"
          cmake -S "$RUNNER_TEMP/ucode" -B "$RUNNER_TEMP/ucode/build" -DCMAKE_BUILD_TYPE=Release >/dev/null
          cmake --build "$RUNNER_TEMP/ucode/build" -j"$(nproc)" >/dev/null
          UC="$RUNNER_TEMP/ucode/build/ucode"

          # ucode RESOLVES `import` at COMPILE time, so header.ut's two imports must resolve or
          # nothing compiles. Both are the ROUTER's runtime, not ours: `luci.core` is luci-base's
          # ucode library (/usr/share/ucode/luci/core.uc) and `uci` is a native ucode binding
          # (uci.so, built only against libuci). Neither exists on a bare runner, and dragging
          # luci-base + libuci in to satisfy an import would make this gate a distro build.
          #
          # What this gate is for is OUR syntax — a stray brace in a .ut that would make every
          # user's LuCI fall back to another theme. So stub the two modules and point ucode's
          # search path at them: the import resolves, the template is parsed for real, and the
          # stub bodies are never executed (-c compiles, it does not run). If a template ever
          # imports something new, the compile fails loudly here rather than on the router —
          # which is exactly the behaviour we want out of a missing stub.
          STUB="$RUNNER_TEMP/ucode-stubs"
          mkdir -p "$STUB/luci"
          printf '%s\n' \
            'function cursor() { return { get: function() { return null; } }; }' \
            'export { cursor };' > "$STUB/uci.uc"
          printf '%s\n' \
            'function getuid() { return 0; }' \
            'function getspnam() { return null; }' \
            'export { getuid, getspnam };' > "$STUB/luci/core.uc"

          n=0
          for f in $(find luci-theme-footstrap/ucode -name '*.ut'); do
            "$UC" -T -c -L "$STUB/*.uc" -o /dev/null "$f" || { echo "template does not compile: $f"; exit 1; }
            n=$((n + 1))
          done
          [ "$n" -gt 0 ] || { echo "no .ut templates found — the glob is wrong"; exit 1; }
          echo "$n ucode template(s) compile."

      # rpcd SKIPS an acl.d file it cannot parse, and says nothing. A trailing comma here
      # means file.exec on the self-update script is granted to nobody: the update badge and
      # the Update button both die with "Access denied", for every user, and neither the
      # package build nor any other gate notices.
      - name: rpcd ACL is valid JSON
        run: |
          set -eu
          for f in luci-theme-footstrap/root/usr/share/rpcd/acl.d/*.json; do
            python3 -m json.tool "$f" >/dev/null || { echo "invalid JSON: $f"; exit 1; }
            echo "ok: $f"
          done

      - name: Build the stylesheet (this also enforces the size budget)
        run: luci-theme-footstrap/build-css.sh /tmp/cascade.css

      - name: Font budget
        run: |
          set -eu
          # uhttpd serves /www/luci-static/* with NO compression, so these bytes are
          # wire bytes. The faces are split by unicode-range, so a given UI fetches a
          # subset of this — but the whole set still has to stay honest.
          total=$(cat luci-theme-footstrap/htdocs/luci-static/footstrap/fonts/*.woff2 | wc -c)
          # A RATCHET, not a ceiling: it was 102400 while a bold mono face was shipped.
          # That face is gone (it drew labels, see styles/01-fonts.css), the set is now
          # 68 488 bytes, and the budget is tightened to match so it cannot drift back.
          budget=71680   # 70 KB for every subset of every face, combined
          echo "fonts: $total bytes (budget $budget)"
          [ "$total" -le "$budget" ] || { echo "over the font budget"; exit 1; }

      - name: CSS/JS audit (undefined vars, shadowed rules, stray !important, colour literals)
        run: python3 .claude/skills/footstrap-audit/audit.py --strict

      # A string wrapped in _() that has no translation renders in ENGLISH, silently —
      # which is how the whole Appearance popover stayed English on a Russian LuCI while
      # every string in it was already marked translatable. Fails if the .pot is stale
      # (a string was added without rerunning update-po.sh) or if any msgstr is empty.
      - name: i18n (translation catalogue current and complete)
        run: |
          sudo apt-get update && sudo apt-get install -y gettext
          luci-theme-footstrap/update-po.sh --check

  # npm-based gates. These live HERE and nowhere else: the OpenWrt buildbot has no
  # node, and luci.mk never needs one — it copies htdocs/ and ucode/ verbatim. Nothing
  # in package.json is shipped.
  lint:
    name: Lint + accessibility
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - name: ESLint (theme JS)
        run: npx eslint luci-theme-footstrap/htdocs

      - name: Stylelint (styles/ tree)
        run: npx stylelint "luci-theme-footstrap/styles/**/*.css"

      - name: Install Chromium for axe
        run: npx playwright install --with-deps chromium

      # docs/gallery.html renders every widget LuCI (or a third-party luci-app-*) can
      # emit, and it is a STATIC file — so the whole widget surface of the theme can be
      # audited here with no router, no session and no network. Runs the full
      # {light,dark} x {footstrap,hicontrast} matrix, because a palette switcher
      # multiplies the contrast matrix and that is exactly where failures hide.
      - name: axe-core (WCAG 2.2 AA over the widget gallery, all palettes x modes)
        run: node tools/a11y-gallery.mjs

      # The --*-color-* export tier is the contract with OTHER people's packages (podkop,
      # justclash, stock firewall.js all read it), and axe cannot see it: those widgets are
      # not in our gallery. Proves every level is legible as text AND as a fill, and that
      # high/medium/low are actually three different colours — they were once three aliases
      # of one token, and a flat colour passes every contrast check there is.
      - name: "Export tier (third-party contract: AA + the ramp is not flat)"
        run: node tools/export-tier.mjs

      # A ratchet on the sheet's SHAPE, in the same spirit as build-css.sh's byte budgets.
      # `!important` is 33 by design (16 in theme+pages, each fighting an inline or unlayered
      # declaration that no cascade layer can outrank, + 17 in base) — stylelint stops a NEW
      # file adding one, this stops the allowlisted files quietly growing more.
      - name: "CSS metrics ratchet (!important, specificity, empty rules)"
        run: node tools/css-metrics.mjs

      # Dead CSS, scoped to OUR namespace — and the scoping is what makes it safe. The
      # coverage contract (CLAUDE.md) forbids pruning a selector just because no page we can
      # see renders it: a third-party luci-app-* renders widgets stock LuCI never does. But
      # NOBODY else can emit an `fs-` class, so inside that namespace "nothing we ship emits
      # it" really does mean dead. This is the check that catches a selector left behind when
      # its markup is deleted.
      - name: "Orphaned fs-* selectors (dead CSS in our own namespace)"
        run: node tools/fs-orphans.mjs

      # The same declaration body written under two DIFFERENT guards (a media query vs an
      # attribute selector, or two @container queries). No linter can flag this — to a
      # cascade-aware tool both rules are required, since only one ever matches — yet it is
      # exactly the shape that drifts. Every such body must be folded into one rule, or
      # PINNED with @mirror; an unpinned duplicate fails the build.
      - name: "Duplicated declaration bodies across guards"
        run: node tools/css-dup.mjs

      # ...and the other half of that: css-dup only sees bodies that are IDENTICAL, so it
      # goes quiet the moment two copies drift — exactly when it should shout. This holds
      # every @mirror-pinned copy byte-identical, across CSS *and* shell (install.sh and
      # footstrap-selfupdate.sh cannot share a file: the installer is `curl | sh` and runs
      # before the package that would contain the library exists).
      - name: "@mirror (pinned duplication stays byte-identical)"
        run: node tools/mirror.mjs

      # The Appearance axes are implemented TWICE and cannot be merged: head.ut stamps :root
      # before the first paint (inline, before the module loader exists) and
      # menu-footstrap-common.js applies them live. This holds the two to the same contract —
      # key names, attributes, custom properties, ranges, the rounding default, and the
      # ordering rule (custom property BEFORE the attribute, or a reload paints one frame with
      # the previous hue). Its only symptom is a single wrong frame, which nobody reports.
      - name: "Appearance axes (the pre-paint template agrees with the live appliers)"
        run: node tools/axes.mjs

      # THE GATE THAT MAKES SHIPPING MINIFIED JS SAFE.
      #
      # luci.mk minifies our JS with jsmin on the buildbot. jsmin decides whether a `/`
      # opens a regex or a division from a ONE-character lookback against a fixed
      # allow-list that contains neither `n` (from `return`) nor `>` (from `=>`), so
      # `return /re/` can make it swallow the rest of the file — WHILE EXITING 0
      # (openwrt/luci#8299, #8020, #8021, #8256). A non-zero exit code proves nothing.
      #
      # So we build the exact same jsmin from luci-base/src/jsmin.c and prove its output
      # is TOKEN-IDENTICAL to our source. eslint's `wrap-regex` stops the hazardous shape
      # being written in the first place; this proves it never got through.
      #
      # jsmin.c is byte-identical on openwrt-24.10 and master (checked), so one build
      # covers both releases we support.
      #
      # PINNED TO A COMMIT AND CHECKSUMMED, because of what this file IS: we download C
      # source over the network, compile it, and then run it as the gate that decides
      # whether our shipped JavaScript is safe. Fetching that from a moving `master` means
      # the gate is whatever upstream happened to push — and a bad day there (or a poisoned
      # raw.githubusercontent cache) silently rewrites the check itself. A commit SHA is
      # immutable; the sha256 says so out loud. Bump both together, deliberately.
      # The commit and the checksum come from luci-theme-footstrap/luci-upstream.pin, which
      # update-po.sh sources for ITS borrowed tool as well — one file, so bumping upstream
      # cannot leave half the toolchain behind.
      - name: Build jsmin (the same one the buildbot uses)
        run: |
          set -eu
          . ./luci-theme-footstrap/luci-upstream.pin
          curl -fsSL --proto '=https' --proto-redir '=https' -o /tmp/jsmin.c \
            "https://raw.githubusercontent.com/openwrt/luci/$LUCI_PIN/modules/luci-base/src/jsmin.c"
          echo "$JSMIN_SHA256  /tmp/jsmin.c" | sha256sum -c -
          cc -O2 -o /tmp/jsmin /tmp/jsmin.c

      # WHICH JS SHIPS — asked once, of the thing that decides it.
      #
      # The two steps below used to spell out the same pair of globs
      # (resources/*.js + resources/view/status/include/*.js) independently, so a new JS
      # directory had to be remembered in both — and if it was added to only one, the other
      # silently stopped covering it. There is no list: luci.mk copies htdocs/ wholesale, so
      # every .js under htdocs IS the shipped set. Ask the filesystem.
      - name: Resolve the shipped JS
        run: |
          set -eu
          files=$(find luci-theme-footstrap/htdocs -name '*.js' | sort | tr '\n' ' ')
          [ -n "$files" ] || { echo "found no shipped JS — the glue is broken, not the theme"; exit 1; }
          echo "SHIPPED_JS=$files" >> "$GITHUB_ENV"
          echo "$files" | tr ' ' '\n'

      - name: jsmin equivalence (minified JS must be the same program)
        env:
          JSMIN: /tmp/jsmin
        run: node tools/jsmin-verify.mjs $SHIPPED_JS

      - name: JS size budget (measured AFTER minification — that is what ships)
        env:
          JSMIN: /tmp/jsmin
        run: |
          set -eu
          total=0
          for f in $SHIPPED_JS; do
            n=$(/tmp/jsmin < "$f" | wc -c)
            total=$((total + n))
          done
          # 46 KB of minified JS; it is 46249 B today. A RATCHET, kept close to the real number
          # on purpose: raising it is a decision, and this one was — the SPA router grew ~3 KB
          # (26657 -> 29747 B minified) for the third-party-CSS guard, the sheet dedupe and the
          # dark-mode stamping. Tighten it again whenever bytes go away, so they cannot drift back.
          budget=47104
          echo "minified theme JS: $total bytes (budget $budget)"
          [ "$total" -le "$budget" ] || { echo "over the JS budget"; exit 1; }

  build:
    needs: [check, lint]
    name: Build ${{ matrix.fmt }} (${{ matrix.channel }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - fmt: apk
            channel: snapshot
            use_apk: 'y'
          - fmt: ipk
            channel: '24.10'
            use_apk: 'n'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve package version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "FOOTSTRAP_VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_ENV"
          else
            echo "FOOTSTRAP_VERSION=0.$(date +%y%m%d).${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"
          fi

      - name: Install host tools
        run: sudo apt-get update && sudo apt-get install -y zstd xz-utils rsync

      - name: Download OpenWrt SDK
        run: |
          set -euo pipefail
          if [ "${{ matrix.channel }}" = "snapshot" ]; then
            BASE="https://downloads.openwrt.org/snapshots/targets/x86/64"
          else
            # newest 24.10.x point release
            LATEST="$(curl -sfL 'https://downloads.openwrt.org/releases/' \
              | grep -oE '24\.10\.[0-9]+' | sort -V | uniq | tail -n1)"
            [ -n "$LATEST" ] || LATEST="24.10.4"
            echo "Using OpenWrt release: $LATEST"
            BASE="https://downloads.openwrt.org/releases/$LATEST/targets/x86/64"
          fi

          SDK_FILE="$(curl -sfL "$BASE/" | grep -oE 'openwrt-sdk-[^"<]+\.tar\.(zst|xz)' | head -n1)"
          [ -n "$SDK_FILE" ] || { echo "SDK filename not found at $BASE"; exit 1; }
          echo "Using SDK: $SDK_FILE"
          curl -fL --proto '=https' --proto-redir '=https' "$BASE/$SDK_FILE" -o "$RUNNER_TEMP/sdk.tar"

          # The SDK is the least verified input in this repo and the only one that ends up in
          # the released package: jsmin.c and i18n-scan.pl — two LINTERS — are pinned by commit
          # and sha256, while the toolchain that actually builds the artifact users install
          # arrived on trust. OpenWrt publishes sha256sums next to the tarball; check it.
          curl -sfL --proto '=https' --proto-redir '=https' "$BASE/sha256sums" -o "$RUNNER_TEMP/sha256sums"
          WANT="$(grep -F " *$SDK_FILE" "$RUNNER_TEMP/sha256sums" | cut -d' ' -f1)"
          [ -n "$WANT" ] || { echo "no sha256 published for $SDK_FILE"; exit 1; }
          GOT="$(sha256sum "$RUNNER_TEMP/sdk.tar" | cut -d' ' -f1)"
          [ "$WANT" = "$GOT" ] || { echo "SDK checksum mismatch: want $WANT, got $GOT"; exit 1; }
          echo "SDK sha256 verified."

          case "$SDK_FILE" in
            *.zst) tar --zstd -xf "$RUNNER_TEMP/sdk.tar" -C "$RUNNER_TEMP" ;;
            *.xz)  tar -xJf   "$RUNNER_TEMP/sdk.tar" -C "$RUNNER_TEMP" ;;
          esac
          SDK_DIR="$(find "$RUNNER_TEMP" -maxdepth 1 -type d -name 'openwrt-sdk*' | head -n1)"
          [ -n "$SDK_DIR" ] || { echo "SDK dir not found"; exit 1; }
          echo "SDK_DIR=$SDK_DIR" >> "$GITHUB_ENV"

      - name: Build package
        working-directory: ${{ env.SDK_DIR }}
        run: |
          set -euo pipefail
          # copy just the package dir (preserving the theme's symlinks) into the SDK
          mkdir -p package/luci-theme-footstrap
          rsync -a --delete "$GITHUB_WORKSPACE/luci-theme-footstrap/" package/luci-theme-footstrap/

          ./scripts/feeds update -a
          ./scripts/feeds install -a

          echo 'CONFIG_PACKAGE_luci-theme-footstrap=m' >> .config
          if [ "${{ matrix.use_apk }}" = "y" ]; then
            echo 'CONFIG_USE_APK=y' >> .config
          fi
          make defconfig
          make package/luci-theme-footstrap/compile V=s FOOTSTRAP_VERSION="$FOOTSTRAP_VERSION"

          # The translation catalogue is compiled INTO the theme package (Build/Prepare -> po2lmo),
          # so it is a build artefact, not a file in git — and a silently missing .lmo is the whole
          # bug class this area keeps producing: every _() then renders its English msgid and
          # nothing anywhere complains. Assert it exists in the staged package tree.
          find build_dir -name 'footstrap-theme.*.lmo' | grep -q . || {
            echo "no footstrap-theme.<lang>.lmo in the package — the theme would ship untranslated"
            exit 1
          }

          mkdir -p "$GITHUB_WORKSPACE/dist"
          find bin/ -type f \( -name 'luci-theme-footstrap-*.apk' -o -name 'luci-theme-footstrap_*.ipk' \) \
            -exec cp {} "$GITHUB_WORKSPACE/dist/" \;
          ls -lah "$GITHUB_WORKSPACE/dist"

          # EXACTLY ONE package per format, and this check is load-bearing — it is not tidiness.
          #
          # `footstrap-selfupdate.sh` as it exists on routers ALREADY IN THE FIELD picks the
          # release asset with `grep -E '\.apk$' | head -1`, and the GitHub API returns the asset
          # list sorted BY NAME. v0.8.4 added a second package (luci-i18n-footstrap-ru), which
          # sorts BEFORE luci-theme-footstrap — so every existing router's Update button installed
          # a 6 KB translation catalogue instead of the theme, reported success, and went on
          # offering the same update forever (issue #6). That script cannot be fixed remotely; the
          # only thing we control is what the release contains. So: one asset per format, and the
          # catalogue travels inside the theme package (see the Makefile).
          #
          # If a second package is ever genuinely needed, it must sort AFTER the theme by NAME in
          # BOTH schemes (apk `name-1.2.3-r1.apk`, ipk `name_1.2.3-r1_all.ipk` — note '-' < '_'),
          # and that is a decision to make deliberately, not by adding a glob.
          n=$(ls "$GITHUB_WORKSPACE/dist" | grep -c "\.${{ matrix.fmt }}$" || true)
          [ "$n" = 1 ] || { echo "expected exactly 1 .${{ matrix.fmt }}, got $n — see the note above"; exit 1; }
          ls "$GITHUB_WORKSPACE/dist" | grep -q '^luci-theme-footstrap[-_]' \
            || { echo "no theme ${{ matrix.fmt }} produced"; exit 1; }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: luci-theme-footstrap-${{ matrix.fmt }}
          path: dist/*.${{ matrix.fmt }}
          if-no-files-found: error

  release:
    name: Attach packages to release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    # the one job that writes anything — see the workflow-level `permissions` above
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      # Checkout (this job only downloaded artifacts before) — the release body is
      # built from the tag's CHANGELOG section, so the repo has to be present.
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      # Turn the tag's CHANGELOG section into a short release body: one line per
      # change (the bold lead of each bullet), grouped by Fixed/Added/…, with the
      # install commands tucked into a collapsed block. The verbose rationale in the
      # changelog is for maintainers and stays out of the release notes.
      - name: Build release notes from the CHANGELOG
        run: |
          ver="${GITHUB_REF_NAME#v}"
          sh tools/release-notes.sh "$ver" > "$RUNNER_TEMP/notes.md"
          cat "$RUNNER_TEMP/notes.md"

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          body_path: ${{ runner.temp }}/notes.md
